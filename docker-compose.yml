services:
  postgres:
    image: postgres:16-alpine
    container_name: fastbuy-db
    environment:
      POSTGRES_DB: fastbuy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/FastBuy.API
      dockerfile: Dockerfile
    container_name: fastbuy-api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=fastbuy;Username=postgres;Password=postgres123
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fastbuy-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
